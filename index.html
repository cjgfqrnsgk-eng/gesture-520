<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>520</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #06060d; touch-action: manipulation; }
  canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  video { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="debug" style="position:fixed;top:4px;left:4px;z-index:999;background:rgba(0,0,0,0.75);color:#0f0;font:10px/16px monospace;padding:8px;border-radius:4px;pointer-events:none;max-width:250px"></div>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height;

function resize() {
  const oldW = width;
  width = window.innerWidth;
  height = window.innerHeight;

  if (width !== oldW && oldW !== undefined) {
    // 按比例调整粒子位置
    const scaleX = width / oldW;
    for (const p of particles) {
      p.x *= scaleX;
      if (p.y > height) p.y = height * Math.random();
    }
  }

  canvas.width = width * devicePixelRatio;
  canvas.height = height * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// 状态机
const STATE = { LOADING: 'loading', WAITING: 'waiting', REVEALING: 'revealing' };
let appState = STATE.LOADING;
let sequenceProgress = 0; // 0=等5, 1=等2, 2=等0, 3=完成
let gestureStableMs = 0;
let lastFingerCount = -1;
const GESTURE_HOLD_MS = 600; // 手势稳定0.6秒确认
const TARGET_SEQUENCE = [5, 2, 0];

// 照片
const photo = new Image();
photo.src = 'photo.jpg';

let revealStartTime = 0;
const GLOW_MAX_RADIUS_FACTOR = 0.45;
const REVEAL_DURATION = 2.5; // 浮现动画总时长（秒）

// 摄像头和 MediaPipe
let currentFingerCount = -1;
let frameCount = 0;
let resultCount = 0;
const videoEl = document.getElementById('video');

function initMediaPipe() {
  try {
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.3,
    });

    hands.onResults((results) => {
      resultCount++;
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const lm = results.multiHandLandmarks[0];
        currentFingerCount = countFingers(lm);
        debugStatus = 'tracking';
      } else {
        currentFingerCount = -1;
        debugStatus = 'waiting-hand';
      }
    });

    return hands;
  } catch (err) {
    debugStatus = 'MediaPipe-ERR: ' + err.message;
    return null;
  }
}

// 手指计数：比较指尖到指根距离 vs 指中关节到指根距离
// 伸展时指尖距指根远，弯曲时指尖距指根近
// 使用欧几里得距离，不受手掌旋转方向影响
//
// MediaPipe 关键点索引：
//   拇指: 4(tip), 3(ip), 2(mcp)
//   食指: 8(tip), 6(pip), 5(mcp)
//   中指: 12(tip), 10(pip), 9(mcp)
//   无名指: 16(tip), 14(pip), 13(mcp)
//   小指: 20(tip), 18(pip), 17(mcp)
let fingerDetail = '';
function countFingers(landmarks) {
  const fingers = [
    [4, 3, 2, 'T'],   // 拇指: tip, ip, mcp
    [8, 6, 5, 'I'],   // 食指: tip, pip, mcp
    [12, 10, 9, 'M'], // 中指: tip, pip, mcp
    [16, 14, 13, 'R'],// 无名指: tip, pip, mcp
    [20, 18, 17, 'P'],// 小指: tip, pip, mcp
  ];

  let count = 0;
  const bits = [];
  for (const [tip, pip, mcp, label] of fingers) {
    const tipDist = Math.hypot(landmarks[tip].x - landmarks[mcp].x, landmarks[tip].y - landmarks[mcp].y);
    const pipDist = Math.hypot(landmarks[pip].x - landmarks[mcp].x, landmarks[pip].y - landmarks[mcp].y);
    const extended = tipDist > pipDist * 1.1;
    if (extended) count++;
    bits.push(label + ':' + (extended ? '1' : '0'));
  }
  fingerDetail = bits.join(' ');

  return count;
}

async function startCamera() {
  try {
    debugStatus = 'camera-req';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    videoEl.srcObject = stream;
    await videoEl.play();
    debugStatus = 'camera-ok';

    const hands = initMediaPipe();
    if (!hands) return;

    debugStatus = 'model-loading';
    // 等待模型预热（hands.send 首次调用会触发模型下载）
    await hands.send({ image: videoEl });

    // 不用 Camera 工具类，自己在渲染循环中喂帧
    window._hands = hands;
    debugStatus = 'ready';
    appState = STATE.WAITING;
  } catch (err) {
    debugStatus = 'ERROR: ' + (err.message || err);
    console.error('Camera/MediaPipe init failed:', err);
  }
}

// 时间
let lastTime = performance.now();
let totalTime = 0;

// 粒子系统
const PARTICLE_COUNT = 250;
let particles = [];
let particleBrightness = 0.4; // 0.0-1.0, 基础亮度

function initParticles() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * width,
      y: Math.random() * height,
      size: 0.5 + Math.random() * 1.5,
      baseAlpha: 0.15 + Math.random() * 0.35,
      speedY: -3 - Math.random() * 8, // 上升速度 px/s
      speedX: (Math.random() - 0.5) * 4,
      phase: Math.random() * Math.PI * 2, // 随机相位用于波动
    });
  }
}
initParticles();

// 涟漪系统
let ripples = [];

function loop(now) {
  requestAnimationFrame(loop);

  const dt = Math.min((now - lastTime) / 1000, 0.1); // cap at 100ms
  lastTime = now;
  totalTime += dt;

  // 清屏
  ctx.clearRect(0, 0, width, height);
  ctx.fillStyle = '#06060d';
  ctx.fillRect(0, 0, width, height);

  // 各模块的 update + draw 在此调用
  update(dt);
  draw();
}

function brightenParticles(intensity) {
  particleBrightness = Math.min(1.0, particleBrightness + intensity * 0.2);
}

function updateParticles(dt) {
  // 亮度逐渐恢复到基础值
  particleBrightness += (0.4 - particleBrightness) * dt * 0.5;

  for (const p of particles) {
    p.y += p.speedY * dt;
    p.x += p.speedX * dt + Math.sin(totalTime * 0.7 + p.phase) * dt * 2;

    // 超出屏幕上方，从底部重新生成
    if (p.y < -10) {
      p.y = height + 10;
      p.x = Math.random() * width;
    }
    // 水平越界回绕
    if (p.x < -10) p.x = width + 10;
    if (p.x > width + 10) p.x = -10;
  }
}

function updateParticlesReveal(dt) {
  particleBrightness += (0.15 - particleBrightness) * dt * 1.5;
  for (const p of particles) {
    p.y += p.speedY * dt;
    p.x += p.speedX * dt + Math.sin(totalTime * 0.3 + p.phase) * dt;
    if (p.y < -10) { p.y = height + 10; p.x = Math.random() * width; }
    if (p.x < -10) p.x = width + 10;
    if (p.x > width + 10) p.x = -10;
  }
}

function triggerGesture(fingerCount) {
  sequenceProgress++;

  // 发射涟漪
  const intensity = sequenceProgress; // 1, 2, 3
  ripples.push({
    radius: 0,
    maxRadius: Math.min(width, height) * 0.35,
    alpha: 1.0,
    speed: 180 + intensity * 40, // px/s, 越来越快
    thickness: intensity, // 1/2/3 圈
    startTime: totalTime,
  });

  // 粒子变亮
  brightenParticles(intensity);

  if (sequenceProgress >= 3) {
    // 全部完成，延迟后进入浮现状态
    setTimeout(() => {
      appState = STATE.REVEALING;
    }, 800);
  }
}

function updateRipples(dt) {
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.radius += r.speed * dt;
    r.alpha -= dt * 0.8; // 淡出
    if (r.alpha <= 0 || r.radius >= r.maxRadius) {
      ripples.splice(i, 1);
    }
  }
}

function update(dt) {
  // 手动喂帧给 MediaPipe（不用 Camera 工具类）
  if (window._hands && videoEl.readyState >= 2 && appState !== STATE.REVEALING) {
    frameCount++;
    window._hands.send({ image: videoEl });
  }

  if (appState === STATE.WAITING) {
    updateParticles(dt);

    const targetFingers = TARGET_SEQUENCE[sequenceProgress];

    if (currentFingerCount === targetFingers) {
      gestureStableMs += dt * 1000;
      if (gestureStableMs >= GESTURE_HOLD_MS) {
        // 手势确认！
        triggerGesture(targetFingers);
        gestureStableMs = 0;
      }
    } else {
      // 手势不匹配或没检测到手，重置计时
      gestureStableMs = 0;
    }
  } else if (appState === STATE.REVEALING) {
    updateParticlesReveal(dt);
  } else {
    // LOADING
    updateParticles(dt);
  }

  updateRipples(dt);
}

function drawLoadingRing() {
  const cx = width / 2;
  const cy = height / 2;
  const ringRadius = 36;

  ctx.save();
  ctx.translate(cx, cy);

  // 底层固定微光圆环
  ctx.beginPath();
  ctx.arc(0, 0, ringRadius, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255, 215, 0, 0.1)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 旋转的光弧段
  const angle = totalTime * 1.5; // 旋转速度
  const arcLength = Math.PI * 0.6; // 弧段长度
  ctx.beginPath();
  ctx.arc(0, 0, ringRadius, angle, angle + arcLength);
  ctx.strokeStyle = 'rgba(255, 215, 0, 0.5)';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // 弧段端点的光点
  const tipX = Math.cos(angle + arcLength) * ringRadius;
  const tipY = Math.sin(angle + arcLength) * ringRadius;
  ctx.beginPath();
  ctx.arc(tipX, tipY, 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 215, 0, 0.9)';
  ctx.shadowColor = 'rgba(255, 215, 0, 0.6)';
  ctx.shadowBlur = 10;
  ctx.fill();

  ctx.restore();
}

function drawRipples() {
  const cx = width / 2;
  const cy = height / 2;

  for (const r of ripples) {
    // 画 thickness 圈涟漪（1/2/3 圈对应不同强度手势）
    for (let t = 0; t < r.thickness; t++) {
      const spacing = t * 14; // 圈与圈之间的间距
      const ringRadius = r.radius - spacing;
      if (ringRadius <= 0) continue;

      const ringAlpha = r.alpha * (1 - t * 0.25); // 外圈最亮，内圈递减

      ctx.save();
      ctx.globalAlpha = ringAlpha;
      ctx.beginPath();
      ctx.arc(cx, cy, ringRadius, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255, 215, 0, 0.7)';
      ctx.lineWidth = 1.5 - t * 0.3;
      ctx.shadowColor = 'rgba(255, 215, 0, 0.4)';
      ctx.shadowBlur = 8;
      ctx.stroke();
      ctx.restore();
    }

    // 涟漪中心的光点
    if (r.alpha > 0.3) {
      const dotAlpha = r.alpha * 0.8;
      ctx.save();
      ctx.globalAlpha = dotAlpha;
      ctx.beginPath();
      ctx.arc(cx, cy, 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 215, 0, 0.9)';
      ctx.shadowColor = 'rgba(255, 215, 0, 0.8)';
      ctx.shadowBlur = 16;
      ctx.fill();
      ctx.restore();
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.baseAlpha * particleBrightness;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 215, 0, ${alpha})`;
    ctx.shadowColor = 'rgba(255, 215, 0, 0.3)';
    ctx.shadowBlur = p.size * 2;
    ctx.fill();
  }
  // 清除 shadow 避免影响其他绘制
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
}

// 照片浮现
function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

function drawPhotoReveal() {
  const cx = width / 2;
  const cy = height / 2;

  if (revealStartTime === 0) {
    revealStartTime = totalTime;
  }

  const elapsed = totalTime - revealStartTime;
  const progress = Math.min(elapsed / REVEAL_DURATION, 1.0);

  // 阶段：0-0.4 光晕扩散，0.25-1.0 照片淡入
  const glowProgress = Math.min(progress / 0.4, 1.0);
  const photoFadeProgress = Math.max(0, (progress - 0.25) / 0.75);

  // 绘制暖金色光晕
  const maxGlow = Math.min(width, height) * GLOW_MAX_RADIUS_FACTOR;
  const glowRadius = maxGlow * easeOutCubic(glowProgress);

  const glow = ctx.createRadialGradient(cx, cy, glowRadius * 0.3, cx, cy, glowRadius);
  glow.addColorStop(0, 'rgba(255, 200, 50, 0.5)');
  glow.addColorStop(0.4, 'rgba(255, 180, 30, 0.2)');
  glow.addColorStop(0.7, 'rgba(255, 150, 20, 0.05)');
  glow.addColorStop(1, 'rgba(255, 100, 0, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, width, height);

  // 绘制照片
  if (photo.complete && photo.naturalWidth > 0) {
    const photoW = width * 0.75;
    const photoH = (photoW / photo.naturalWidth) * photo.naturalHeight;
    const maxH = height * 0.65;

    let drawW = photoW;
    let drawH = photoH;
    if (drawH > maxH) {
      drawH = maxH;
      drawW = (drawH / photo.naturalHeight) * photo.naturalWidth;
    }

    const px = cx - drawW / 2;
    const py = cy - drawH / 2;

    ctx.save();
    ctx.globalAlpha = photoFadeProgress;
    ctx.shadowColor = 'rgba(255, 200, 50, 0.5)';
    ctx.shadowBlur = 30 * photoFadeProgress;

    // 圆角裁剪
    const radius = 8;
    ctx.beginPath();
    ctx.moveTo(px + radius, py);
    ctx.lineTo(px + drawW - radius, py);
    ctx.quadraticCurveTo(px + drawW, py, px + drawW, py + radius);
    ctx.lineTo(px + drawW, py + drawH - radius);
    ctx.quadraticCurveTo(px + drawW, py + drawH, px + drawW - radius, py + drawH);
    ctx.lineTo(px + radius, py + drawH);
    ctx.quadraticCurveTo(px, py + drawH, px, py + drawH - radius);
    ctx.lineTo(px, py + radius);
    ctx.quadraticCurveTo(px, py, px + radius, py);
    ctx.closePath();
    ctx.clip();

    ctx.drawImage(photo, px, py, drawW, drawH);
    ctx.restore();
  }
}

function draw() {
  if (appState === STATE.LOADING) {
    drawLoadingRing();
    drawParticles();
  } else if (appState === STATE.WAITING) {
    drawParticles();
    // 手势匹配时：明显的金色光晕脉冲
    if (currentFingerCount === TARGET_SEQUENCE[sequenceProgress] && currentFingerCount >= 0) {
      const pulse = 0.08 + Math.sin(totalTime * 4) * 0.03;
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(0, 0, width, height);
      ctx.restore();
    }
    drawRipples();
  } else if (appState === STATE.REVEALING) {
    drawParticles();
    drawRipples();
    drawPhotoReveal();
  }
  // 始终显示调试信息
  drawDebug();
}

// 调试信息（始终显示，正式发布时注释掉 drawDebug() 调用）
let debugStatus = 'init';
function drawDebug() {
  const el = document.getElementById('debug');
  if (!el) return;
  el.innerHTML = [
    'status: ' + debugStatus,
    'fingers: ' + currentFingerCount + ' t:' + (TARGET_SEQUENCE[sequenceProgress] ?? '-'),
    'detail: ' + fingerDetail,
    'seq: ' + sequenceProgress + '/3  s:' + (gestureStableMs / 1000).toFixed(1),
    'f:' + frameCount + ' r:' + resultCount + ' v:' + (videoEl.readyState >= 2 ? 'play' : videoEl.readyState),
  ].join('<br>');
}

// 先启动渲染循环（显示加载动画）
requestAnimationFrame(loop);

// 启动摄像头和 MediaPipe
startCamera().catch((err) => {
  console.error('Camera/MediaPipe init failed:', err);
  // 保持加载动画，用户可刷新
});
</script>
</body>
</html>
